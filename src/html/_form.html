<div class="form__item">
    <form id="form" action="#" method="post" novalidate>

        <div class="form-group">
            <label class="form-group__label" for="firstName">Ім'я</label>
            <input class="form-group__input" type="text" id="firstName" name="firstName" autocomplete="given-name"
                aria-describedby="firstName-error" required />
            <span id="firstName-error" class="form-group__error"></span>
        </div>

        <div class="form-group">
            <label class="form-group__label" for="lastName">Прізвище</label>
            <input class="form-group__input" type="text" id="lastName" name="lastName" autocomplete="family-name"
                aria-describedby="lastName-error" required />
            <span id="lastName-error" class="form-group__error"></span>
        </div>

        <div class="form-group">
            <label class="form-group__label" for="email">Email</label>
            <input class="form-group__input" type="email" id="email" name="email" autocomplete="email"
                aria-describedby="email-error" required />
            <span id="email-error" class="form-group__error"></span>
        </div>

        <div class="form-group">
            <label class="form-group__label" for="phone">Телефон</label>
            <input class="form-group__input phone__input" name="phone" type="tel" id="phone" autocomplete="tel"
                aria-describedby="phone-error" required />
            <span id="phone-error" class="form-group__error"></span>
        </div>

        <div class="form__actions">
            <button type="submit" class="form__btn">Відправити</button>
        </div>

    </form>
</div>
